
<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>ERRANDS SERVICE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-embu-green { background-color: #006400; }
        .text-embu-gold { color: #FFD700; }
        .bg-embu-gold { background-color: #FFD700; }
        .border-embu-gold { border-color: #FFD700; }
        .shadow-embu { shadow: 0 4px 6px -1px rgba(0, 100, 0, 0.1), 0 2px 4px -1px rgba(0, 100, 0, 0.06); }
        /* Custom Leaflet styling to match Embu brand */
        .leaflet-container { background: #f3f4f6; border-radius: 1rem; }
        .leaflet-bar a { background-color: white; border-bottom: 1px solid #eee; color: #006400; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        embu: {
                            green: '#006400',
                            gold: '#FFD700',
                            darkGreen: '#004d00'
                        }
                    }
                }
            }
        }
